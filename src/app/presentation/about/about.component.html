<section
  id="about"
  class="about"
  appReveal
  [@fadeUp]="revealState()"
  (revealed)="reveal()"
>
  <div class="about__inner">
    <p class="section-tag">{{ text().about.tag }}</p>

    <div class="about__grid">
      <div class="about__bio">
        <p class="about__text">{{ profile().bio }}</p>

        <ul class="about__pills">
          @for (tech of profile().technologies; track tech) {
            <li class="pill">{{ tech }}</li>
          }
        </ul>
      </div>

      <div class="about__stats">
        @for (stat of stats(); track stat.id) {
          <div class="stat">
            <span
              class="stat__value"
              [appCountUp]="stat.value"
              [countUpSuffix]="stat.suffix"
            >
              0
            </span>
            <span class="stat__label">{{ stat.label }}</span>
          </div>
        }
      </div>
    </div>
  </div>
</section>
